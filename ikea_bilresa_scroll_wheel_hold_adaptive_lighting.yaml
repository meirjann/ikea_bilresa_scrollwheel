blueprint:
  name: "IKEA Bilresa Scroll Wheel - Adaptive Lighting Hold"
  description: "Erweiterter Controller für das IKEA Bilresa Scroll Wheel mit Adaptive Lighting Hold Funktion."
  domain: automation
  input:
    scroll_right_event:
      name: "Scroll Wheel Event - Im Uhrzeigersinn"
      selector:
        entity:
          domain: event
    scroll_left_event:
      name: "Scroll Wheel Event - Gegen den Uhrzeigersinn"
      selector:
        entity:
          domain: event
    center_button_event:
      name: "Center Button Event"
      selector:
        entity:
          domain: event
    target_entity:
      name: "Licht"
      selector:
        entity:
          domain: light
    adaptive_lighting_entity:
      name: "Adaptive Lighting Schalter"
      selector:
        entity:
          domain:
            - switch
            - input_boolean
    lock_when_off:
      name: "Sperren wenn aus"
      default: true
      selector:
        boolean: {}
    min_value:
      name: "Minimale Helligkeit"
      default: 10
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    step_size:
      name: "Schrittweite"
      default: 5
      selector:
        number:
          min: 1
          max: 20
    action_single:
      name: "Einfacher Druck"
      default: []
      selector:
        action: {}
    action_double:
      name: "Doppelter Druck"
      default: []
      selector:
        action: {}
    action_triple:
      name: "Dreifacher Druck"
      default: []
      selector:
        action: {}

trigger:
  - platform: state
    entity_id: !input scroll_right_event
    id: "right"
  - platform: state
    entity_id: !input scroll_left_event
    id: "left"
  - platform: state
    entity_id: !input center_button_event
    id: "center"

action:
  - variables:
      target_ent: !input target_entity
      adaptive_ent: !input adaptive_lighting_entity
      lock_act: !input lock_when_off
      min_v: !input min_value
      step_v: !input step_size
      is_on: "{{ states(target_ent) not in ['off', 'unavailable', 'unknown', 'standby'] }}"
      press_count: "{{ trigger.to_state.attributes.totalNumberOfPressesCounted | int(1) if trigger is defined and trigger.to_state is defined else 1 }}"
      event_type: "{{ state_attr(trigger.entity_id, 'event_type') if trigger is defined else 'none' }}"
      current_val: "{{ (state_attr(target_ent, 'brightness') | int(0) / 2.55) | round(0) | int }}"

  - choose:
      # --- SCROLL RIGHT ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'right' and (is_on or not lock_act) }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input target_entity
            data:
              brightness_pct: "{{ [ (current_val + (step_v * press_count)) | int, 100 ] | min }}"

      # --- SCROLL LEFT ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'left' and is_on }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input target_entity
            data:
              brightness_pct: >
                {% set calc = (current_val - (step_v * press_count)) | int %}
                {{ [calc, min_v | int, 0] | max }}

      # --- CENTER BUTTON ACTIONS ---
      - conditions: "{{ trigger.id == 'center' and (event_type == 'short_release' or event_type == 'multi_press_1') }}"
        sequence: !input action_single
      - conditions: "{{ trigger.id == 'center' and (event_type == 'multi_press_2' or press_count == 2) }}"
        sequence: !input action_double
      - conditions: "{{ trigger.id == 'center' and (event_type == 'multi_press_3' or press_count == 3) }}"
        sequence: !input action_triple
      
      # --- HOLD ACTION (Adaptive Lighting) ---
      - conditions: "{{ trigger.id == 'center' and event_type == 'long_press' }}"
        sequence:
          - service: scene.create
            data:
              scene_id: bilresa_hold_snapshot
              snapshot_entities:
                - !input target_entity
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input adaptive_lighting_entity
                    state: "on"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input target_entity
                    data:
                      rgb_color: [226, 36, 0]
                  - delay: { milliseconds: 500 }
                  - service: light.toggle
                    target:
                      entity_id: !input target_entity
                  - delay: { milliseconds: 500 }
                  - service: light.toggle
                    target:
                      entity_id: !input target_entity
                  - delay: { milliseconds: 500 }
            default:
              - service: light.turn_on
                target:
                  entity_id: !input target_entity
                data:
                  rgb_color: [102, 157, 52]
              - delay: { milliseconds: 500 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 500 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 500 }
          
          - service: scene.turn_on
            target:
              entity_id: scene.bilresa_hold_snapshot
          - service: scene.delete
            data:
              scene_id: bilresa_hold_snapshot
          - service: homeassistant.toggle
            target:
              entity_id: !input adaptive_lighting_entity

mode: queued
max: 20
