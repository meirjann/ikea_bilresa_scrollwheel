blueprint:
  name: "IKEA Bilresa Scroll Wheel - Adaptive Lighting Hold"
  description: "Erweiterter Controller für das IKEA Bilresa Scroll Wheel. Beim Halten wird Adaptive Lighting umgeschaltet und die Lampe blinkt zweimal als Feedback."
  domain: automation
  input:
    # --- Entities ---
    scroll_right_event:
      name: "Scroll Wheel Event - Clockwise"
      selector:
        entity:
          domain: event
    scroll_left_event:
      name: "Scroll Wheel Event - Counterclockwise"
      selector:
        entity:
          domain: event
    center_button_event:
      name: "Center Button Event"
      selector:
        entity:
          domain: event
    target_entity:
      name: "Target Entity"
      description: "Die Lampe, die gesteuert wird und blinken soll."
      selector:
        entity:
          domain: light
    adaptive_lighting_entity:
      name: "Adaptive Lighting Entity"
      description: "Der Schalter (Switch/Input Boolean) für Adaptive Lighting."
      selector:
        entity:
          domain:
            - switch
            - input_boolean

    # --- Settings ---
    lock_when_off:
      name: "Lock when off"
      default: true
      selector:
        boolean: {}
    min_value:
      name: "Minimum Brightness"
      default: 10
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    step_size:
      name: "Step Size"
      default: 5
      selector:
        number:
          min: 1
          max: 20

    # --- Additional Actions ---
    action_single:
      name: "Single Press"
      default: []
      selector:
        action: {}
    action_double:
      name: "Double Press"
      default: []
      selector:
        action: {}
    action_triple:
      name: "Triple Press"
      default: []
      selector:
        action: {}

trigger:
  - platform: state
    entity_id: !input scroll_right_event
    id: "right"
  - platform: state
    entity_id: !input scroll_left_event
    id: "left"
  - platform: state
    entity_id: !input center_button_event
    id: "center"

action:
  - variables:
      target_ent: !input target_entity
      lock_act: !input lock_when_off
      min_v: !input min_value
      step_v: !input step_size
      
      domain: "{{ target_ent.split('.')[0] }}"
      is_light: "{{ domain == 'light' }}"
      
      current_val: >
        {% if is_light %}
          {{ (state_attr(target_ent, 'brightness') | int(0) / 2.55) | round(0) | int }}
        {% else %}
          {{ states(target_ent) | float(0) | round(0) | int }}
        {% endif %}
      
      is_on: "{{ states(target_ent) not in ['off', 'unavailable', 'unknown', 'standby'] }}"
      
      press_count: "{{ trigger.to_state.attributes.get('totalNumberOfPressesCounted', 1) | int }}"
      event_type: "{{ state_attr(trigger.entity_id, 'event_type') if trigger is defined else 'none' }}"

  - choose:
      # --- SCROLL RIGHT ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'right' }}"
          - condition: template
            value_template: "{{ not is_light or (is_on or not lock_act) }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input target_entity
            data:
              brightness_pct: "{{ [ (current_val + (step_v * press_count)) | int, 100 ] | min }}"

      # --- SCROLL LEFT ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'left' }}"
          - condition: template
            value_template: "{{ not is_light or is_on }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input target_entity
            data:
              brightness_pct: >
                {% set calc = (current_val - (step_v * press_count)) | int %}
                {% set minimum = min_v | int %}
                {{ [calc, minimum, 0] | max }}

      # --- CENTER BUTTON PRESSES ---
      - conditions: "{{ trigger.id == 'center' and (event_type == 'short_release' or event_type == 'multi_press_1') }}"
        sequence: !input action_single
      - conditions: "{{ trigger.id == 'center' and (event_type == 'multi_press_2' or press_count == 2) }}"
        sequence: !input action_double
      - conditions: "{{ trigger.id == 'center' and (event_type == 'multi_press_3' or press_count == 3) }}"
        sequence: !input action_triple
      
      # --- CENTER BUTTON HOLD (Adaptive Lighting Logic) ---
      - conditions: "{{ trigger.id == 'center' and event_type == 'long_press' }}"
        sequence:
          - service: scene.create
            data:
              scene_id: bilresa_hold_temp_scene
              snapshot_entities:
                - !input target_entity
          - if:
              - condition: state
                entity_id: !input adaptive_lighting_entity
                state: "on"
            then:
              # Rot blinken (2-mal) - Wird ausgeschaltet
              - service: light.turn_on
                target:
                  entity_id: !input target_entity
                data:
                  rgb_color: [226, 36, 0]
              - delay: { milliseconds: 400 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 400 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 400 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 400 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 400 }
            else:
              # Grün blinken (2-mal) - Wird eingeschaltet
              - service: light.turn_on
                target:
                  entity_id: !input target_entity
                data:
                  rgb_color: [102, 157, 52]
              - delay: { milliseconds: 400 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 400 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 400 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 400 }
              - service: light.toggle
                target:
                  entity_id: !input target_entity
              - delay: { milliseconds: 400 }
          
          - service: scene.turn_on
            target:
              entity_id: scene.bilresa_hold_temp_scene
          - service: homeassistant.toggle
            target:
              entity_id: !input adaptive_lighting_entity

mode: queued
max: 20
